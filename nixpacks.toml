# nixpacks.toml
# Fix fuer: ImportError: libsqlite3.so.0: cannot open shared object file
# kerykeion -> requests-cache -> Pythons sqlite3 braucht libsqlite3.so.0 zur Laufzeit.
#
#   nixPkgs : macht das sqlite-Paket verfuegbar
#   nixLibs : haengt dessen Bibliotheken in LD_LIBRARY_PATH (das war der fehlende Teil)
#   aptPkgs : Fallback ueber den Standard-Debian-Pfad
[phases.setup]
nixPkgs = ["...", "sqlite"]
nixLibs = ["sqlite"]
aptPkgs = ["libsqlite3-0"]
